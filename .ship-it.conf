# ship-it configuration for Atmo
APP_NAME="Atmo"
PROJECT_TYPE="spm"
PACKAGE_PATH="AppleTVRemoteApp"
BUILD_DIR="AppleTVRemoteApp/build"
DIST_DIR="dist"
CONFIGURATION="Release"

# Custom hooks for Atmo's hybrid Python/Swift architecture
PRE_BUILD_HOOK="bash AppleTVRemoteApp/Scripts/package_python.sh"
POST_BUILD_HOOK="bash AppleTVRemoteApp/Scripts/bundle.sh"

# Inner-to-outer signing for embedded Python (.so → .dylib → framework → app)
SIGN_HOOK="bash AppleTVRemoteApp/Scripts/codesign_python_app.sh"
