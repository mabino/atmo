name: Build, Notarize and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: false
        type: string

jobs:
  notarize:
    runs-on: macos-latest
    permissions:
      contents: write
      actions: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9.6'

      - name: Set up Python venv
        run: |
          python3 -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install -r pybridge/requirements.lock

      - name: Build app bundle
        run: |
          ./ship build Release

      - name: Restore secrets to files
        env:
          NOTARY_KEY: ${{ secrets.NOTARY_KEY }}
          DEVELOPER_ID_P12: ${{ secrets.DEVELOPER_ID_P12 }}
        run: |
          echo "$NOTARY_KEY" | base64 --decode > /tmp/AuthKey.p8
          echo "$DEVELOPER_ID_P12" | base64 --decode > /tmp/DeveloperID.p12

      - name: Install Developer ID certificate into keychain
        env:
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
        run: |
          security create-keychain -p actions build.keychain
          security import /tmp/DeveloperID.p12 -k build.keychain -P "$DEVELOPER_ID_CERT_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p actions build.keychain

      - name: Get version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ] && [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [ "${{ github.ref_type }}" == "tag" ]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="v1.0.0"
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Notarize and release
        env:
          DEVELOPER_ID_APPLICATION: ${{ secrets.DEVELOPER_ID_APPLICATION }}
          APPLEID: ${{ secrets.APPLEID }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
          APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ./ship notarize -y
          ./ship release -y
      
      - name: Upload release assets
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Atmo ${{ steps.version.outputs.version }}
          body: |
            ## Atmo ${{ steps.version.outputs.version }}
            
            ### Installation
            1. Download `Atmo.zip`
            2. Unzip and drag Atmo.app to your Applications folder
            3. Launch Atmo
            
            This release is signed and notarized with Apple Developer ID.
          files: |
            dist/Atmo.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain build.keychain || true
